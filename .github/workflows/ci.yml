name: CI Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
        
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: set up python
              uses: actions/setup-python@v4
              with:
                python-version: 3.12
            - name: install dependencies
              run: pip install -r requirements.txt
            - name: Install packeges in editable mode
              run: pip install -e .  
            - name: run tests
              run: pytest tests/ -v
              
    docker-build:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@v3
            - name: Build Docker Image
              run: docker build -t stock-tracker .              